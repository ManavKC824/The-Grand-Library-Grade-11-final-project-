<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - The Grand Library</title>
    <style>
        body {
            background-color: #fdf6e3;
            margin: 0;
            font-family: Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .form-container h2 {
            margin-top: 0;
            color: #b58900;
            font-size: 28px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: Verdana, sans-serif;
        }

        .submit-btn {
            width: 100%;
            background-color: #b58900;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #8f6c00;
        }

        .form-footer {
            margin-top: 20px;
            font-size: 14px;
        }

        .form-footer a {
            color: #31b0d5;
            text-decoration: none;
            font-weight: bold;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: black;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="index.html" class="back-link">&larr; Back to Library</a>
        <h2>Login</h2>
        <form onsubmit="event.preventDefault();">
            <input type="email" class="form-input" placeholder="Email Address" required>
            <input type="password" class="form-input" placeholder="Password" required>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <div class="form-footer">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

</body>
</html>
