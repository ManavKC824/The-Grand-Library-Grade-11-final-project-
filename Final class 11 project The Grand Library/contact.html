<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - The Grand Library</title>
    <style>
        body { background-color: #fdf6e3; margin: 0; font-family: Verdana, sans-serif; }
        
        /* --- Top Bar & Navigation --- */
        .top-bar { background-color: black; color: #b58900; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; }
        .menu-icon { font-size: 30px; cursor: pointer; user-select: none; transition: color 0.3s; flex: 1; }
        .menu-icon:hover { color: #F0D000; }
        .search-container { flex: 2; display: flex; justify-content: center; }
        .search-container input[type="text"] { width: 60%; padding: 8px 15px; border: none; border-radius: 4px 0 0 4px; font-size: 14px; font-family: Verdana, sans-serif; }
        .search-container button { padding: 8px 15px; background-color: #b58900; color: white; border: none; border-radius: 0 4px 4px 0; cursor: pointer; font-weight: bold; }
        .search-container button:hover { background-color: #8f6c00; }
        .login-container { flex: 1; display: flex; justify-content: flex-end; }
        .login-toggle { background-color: transparent; color: #b58900; border: 2px solid #b58900; padding: 8px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.3s ease; }
        .login-toggle:hover { background-color: #b58900; color: black; }

        .nav-bar { background-color: #1a1a1a; border-top: 1px solid #333; padding: 12px 20px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .nav-bar ul { list-style-type: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        .nav-bar li { position: relative; }
        .nav-bar a { color: #b58900; text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; transition: color 0.3s; display: block; padding: 5px 0; }
        .nav-bar a:hover { color: #F0D000; }
        .dropdown-content { display: none; position: absolute; background-color: #fdf6e3; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1; border-radius: 4px; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 10px; overflow: hidden;}
        .dropdown-content a { color: black; padding: 12px 16px; border-bottom: 1px solid #eee; }
        .dropdown-content a:hover { background-color: #b58900; color: white; }
        .nav-bar li:hover .dropdown-content { display: block; }

        /* --- Contact Form Specific Styles --- */
        .page-title { text-align: center; font-size: 40px; color: #b58900; font-weight: bold; margin: 40px 0 30px 0; }
        
        .contact-container { max-width: 600px; margin: 0 auto 50px auto; background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .contact-form input[type="text"], .contact-form input[type="email"], .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: Verdana, sans-serif; font-size: 14px; }
        .contact-form textarea { height: 150px; resize: vertical; }
        .submit-btn { background-color: #b58900; color: white; border: none; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background-color 0.3s; }
        .submit-btn:hover { background-color: #8f6c00; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="menu-icon">&#9776;</div>
        <div class="search-container">
            <input type="text" placeholder="Search for books, authors, or genres...">
            <button type="button">Search</button>
        </div>
        <div class="login-container">
            <button class="login-toggle" onclick="window.location.href='login.html'">Login</button>
        </div>
    </div>

    <nav class="nav-bar">
        <ul>
            <li><a href="index.html">Library</a></li>
            <li><a href="new-arrivals.html">New Arrivals</a></li>
            <li><a href="best-selling.html">Best Selling</a></li>
            <li>
                <a href="#">Book Categories &#9662;</a>
                <div class="dropdown-content">
                    <a href="#">Fiction</a>
                    <a href="#">Non-Fiction</a>
                    <a href="#">Mystery & Thriller</a>
                </div>
            </li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="refer.html">Refer & Get Discount</a></li>
            <li><a href="contact.html">Contact Information</a></li>
            <li><a href="social.html">Social Media</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Get in Touch</h1>

    <div class="contact-container">
        <form class="contact-form" action="#" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="How can we help you?" required></textarea>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

</body>
</html>
